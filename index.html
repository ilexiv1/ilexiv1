<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ilexiv</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#09090b;
    --card:#111114;
    --text:#fafafa;
    --muted:#a1a1aa;
    --accent:#7c3aed;
    --accent2:#22d3ee;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,.18), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(34,211,238,.15), transparent 30%),
        var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    width:min(90%,600px);
    background:rgba(17,17,20,.75);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:28px;
    padding:48px;
    text-align:center;
    box-shadow:
        0 10px 40px rgba(0,0,0,.45),
        0 0 60px rgba(124,58,237,.08);
}

.logo{
    font-size:4rem;
    font-weight:700;
    letter-spacing:-3px;
    margin-bottom:10px;
}

.gradient{
    background:linear-gradient(
        135deg,
        var(--accent),
        var(--accent2)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:var(--muted);
    margin-bottom:40px;
    font-size:1rem;
}

.contacts{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.contact{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:18px;
    background:rgba(255,255,255,.03);
    border:1px solid var(--border);
    border-radius:16px;
    text-decoration:none;
    color:var(--text);
    transition:.25s ease;
}

.contact:hover{
    transform:translateY(-3px);
    border-color:rgba(124,58,237,.5);
    background:rgba(124,58,237,.08);
}

.label{
    color:var(--muted);
    font-size:.9rem;
}

.value{
    font-weight:600;
}

.footer{
    margin-top:32px;
    color:var(--muted);
    font-size:.85rem;
}

.glow{
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.15;
    z-index:-1;
}

.glow.one{
    background:var(--accent);
    top:-100px;
    left:-100px;
}

.glow.two{
    background:var(--accent2);
    bottom:-100px;
    right:-100px;
}

@media(max-width:600px){
    .card{
        padding:32px 24px;
    }

    .logo{
        font-size:3rem;
    }
}
</style>
</head>
<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="card">

    <h1 class="logo gradient">ilexiv</h1>

    <p class="subtitle">
        Developer • Gamer • Tech Enthusiast
    </p>

    <div class="contacts">

        <a class="contact" href="https://t.me/ilexiv1" target="_blank">
            <span class="label">Telegram</span>
            <span class="value">@ilexiv1</span>
        </a>

        <a class="contact" href="mailto:ilexiv@proton.me">
            <span class="label">Email</span>
            <span class="value">ilexiv@proton.me</span>
        </a>

    </div>

    <div class="footer">
        © 2026 ilexiv
    </div>

</div>

</body>
</html>
