<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ilexiv</title>
<meta name="description" content="ilexiv — Developer, Gamer, Tech Enthusiast">

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2309090b'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='60' font-family='Arial' font-weight='700' fill='white'%3Ei%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#08090c;
    --card:rgba(17,17,20,.72);
    --text:#ffffff;
    --muted:#9ca3af;
    --border:rgba(255,255,255,.08);
    --accent:#8b5cf6;
    --accent2:#22d3ee;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:
        radial-gradient(circle at 15% 20%, rgba(139,92,246,.18), transparent 25%),
        radial-gradient(circle at 85% 75%, rgba(34,211,238,.12), transparent 25%),
        #08090c;
    overflow:hidden;
}

.bg-grid{
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
    mask-image:radial-gradient(circle at center, black, transparent 85%);
    pointer-events:none;
}

.glow{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
    pointer-events:none;
}

.glow-1{
    width:400px;
    height:400px;
    background:var(--accent);
    top:-120px;
    left:-120px;
}

.glow-2{
    width:350px;
    height:350px;
    background:var(--accent2);
    bottom:-100px;
    right:-100px;
}

.card{
    width:min(620px,100%);
    padding:48px;
    border-radius:32px;
    background:var(--card);
    backdrop-filter:blur(24px);
    border:1px solid var(--border);
    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        0 0 0 1px rgba(255,255,255,.02);
    text-align:center;
}

.logo{
    font-size:4.5rem;
    font-weight:800;
    letter-spacing:-4px;
    line-height:1;
    margin-bottom:10px;
}

.gradient{
    background:linear-gradient(
        135deg,
        var(--accent),
        var(--accent2)
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.tagline{
    color:var(--muted);
    margin-bottom:40px;
    font-size:1rem;
}

.contacts{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.contact{
    text-decoration:none;
    color:var(--text);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 20px;
    border-radius:18px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.06);
    transition:.25s ease;
}

.contact:hover{
    transform:translateY(-3px);
    border-color:rgba(139,92,246,.45);
    background:rgba(139,92,246,.08);
}

.label{
    color:var(--muted);
    font-size:.95rem;
}

.value{
    font-weight:600;
}

.footer{
    margin-top:28px;
    color:var(--muted);
    font-size:.85rem;
}

@media (max-width:600px){

    .card{
        padding:32px 22px;
    }

    .logo{
        font-size:3.4rem;
    }

    .contact{
        flex-direction:column;
        gap:6px;
    }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">

    <h1 class="logo gradient">ilexiv</h1>

    <p class="tagline">
        Developer • Gamer • Tech Enthusiast
    </p>

    <div class="contacts">

        <a class="contact" href="https://t.me/ilexiv1" target="_blank">
            <span class="label">Telegram</span>
            <span class="value">@ilexiv1</span>
        </a>

        <a class="contact" href="https://instagram.com/ilexiv1" target="_blank">
            <span class="label">Instagram</span>
            <span class="value">@ilexiv1</span>
        </a>

        <a class="contact" href="mailto:ilexiv@proton.me">
            <span class="label">Email</span>
            <span class="value">ilexiv@proton.me</span>
        </a>

    </div>

    <div class="footer">
        © 2026 ilexiv
    </div>

</div>

</body>
</html>
