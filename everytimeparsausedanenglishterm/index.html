<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terms Intelligence Dashboard</title>

<style>
:root{
  --bg:#0a0e13;
  --panel:#111826;
  --panel2:#0e1522;
  --text:#e7edf5;
  --muted:#8a93a2;
  --accent:#5cc8ff;
  --border:rgba(255,255,255,0.08);
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: ui-sans-serif, system-ui;
  background: radial-gradient(1200px 800px at 20% 0%, #111a2a 0%, var(--bg) 50%);
  color:var(--text);
}

/* layout */
.wrapper{
  display:grid;
  grid-template-columns: 260px 1fr;
  min-height:100vh;
}

/* sidebar */
.sidebar{
  padding:20px;
  border-right:1px solid var(--border);
  background:rgba(10,14,19,0.6);
  backdrop-filter: blur(12px);
}

.brand{
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.stat{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow: var(--shadow);
}

.stat b{
  display:block;
  font-size:18px;
  color:var(--text);
}

.stat span{
  font-size:11px;
  color:var(--muted);
}

/* main */
.main{
  padding:24px 28px;
}

/* topbar */
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  padding-bottom:14px;
  background:linear-gradient(to bottom, rgba(10,14,19,0.95), transparent);
  backdrop-filter: blur(10px);
}

input{
  width:100%;
  padding:14px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  outline:none;
  box-shadow: var(--shadow);
  font-size:13px;
}

input:focus{
  border-color:var(--accent);
}

.hint{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
}

/* cards */
.grid{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:10px;
}

.card{
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  box-shadow: var(--shadow);
  transition:0.15s ease;
}

.card:hover{
  transform:translateY(-2px);
  border-color:rgba(92,200,255,0.25);
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
  margin-bottom:8px;
}

.text{
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
  color:rgba(231,237,245,0.9);
}

/* tags */
.tags{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tag{
  font-size:11px;
  padding:4px 9px;
  border-radius:999px;
  border:1px solid rgba(92,200,255,0.25);
  background:rgba(92,200,255,0.08);
  color:var(--text);
  cursor:pointer;
  transition:0.15s;
}

.tag:hover{
  background:rgba(92,200,255,0.18);
}

/* highlight */
.hl{
  color:var(--accent);
  font-weight:500;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Terms Intelligence Dashboard</div>

  <div class="stat">
    <b id="total">-</b>
    <span>Total Entries</span>
  </div>

  <div class="stat">
    <b id="terms">-</b>
    <span>Total Terms</span>
  </div>

  <div class="stat">
    <b id="unique">-</b>
    <span>Unique Terms</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <input id="q" placeholder="Search id, text, terms..." />
    <div class="hint">Click a tag to filter • hover cards for depth</div>
  </div>

  <div class="grid" id="list"></div>

</div>
</div>

<script>
let DATA = [];

const list = document.getElementById("list");
const q = document.getElementById("q");

const total = document.getElementById("total");
const terms = document.getElementById("terms");
const unique = document.getElementById("unique");

function normalize(d){
  return d.map(x => ({
    id:x.id,
    date:x.date,
    text:x.text || "",
    terms:x.english_or_finglish_terms || []
  }));
}

function updateStats(data){
  const all = data.flatMap(x => x.terms);
  const set = new Set(all);

  total.textContent = data.length;
  terms.textContent = all.length;
  unique.textContent = set.size;
}

function escape(s){
  return s.replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",
    '"':"&quot;","'":"&#039;"
  }[m]));
}

function highlight(text, q){
  if(!q) return escape(text);
  const r = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return escape(text).replace(r,'<span class="hl">$1</span>');
}

function match(item, s){
  if(!s) return true;
  s = s.toLowerCase();
  return (
    String(item.id).includes(s) ||
    item.date.toLowerCase().includes(s) ||
    item.text.toLowerCase().includes(s) ||
    item.terms.some(t => t.toLowerCase().includes(s))
  );
}

function render(filter=""){
  const filtered = DATA.filter(x => match(x, filter));
  updateStats(filtered);

  list.innerHTML = "";

  for(const item of filtered){
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="meta">
        <span>#${item.id}</span>
        <span>${item.date}</span>
      </div>

      <div class="text">
        ${highlight(item.text, filter)}
      </div>

      <div class="tags">
        ${item.terms.map(t => `
          <span class="tag" data-term="${t}">${escape(t)}</span>
        `).join("")}
      </div>
    `;

    list.appendChild(el);
  }

  document.querySelectorAll(".tag").forEach(t=>{
    t.onclick = () => {
      q.value = t.dataset.term;
      render(t.dataset.term);
    };
  });
}

async function load(){
  const res = await fetch("ps_english_terms_clean.json");
  const json = await res.json();

  DATA = normalize(json);
  updateStats(DATA);
  render();
}

q.addEventListener("input", e => render(e.target.value));

load();
</script>

</body>
</html>
